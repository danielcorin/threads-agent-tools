name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Go ${{ matrix.go-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.24.x']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
      - name: Check formatting
        run: |
          files=$(gofmt -l $(find . -name '*.go' -not -path './dist/*'))
          if [ -n "$files" ]; then
            echo "$files"
            exit 1
          fi
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Build binaries
        run: |
          go build -o /tmp/threads-agent-bridge ./cmd/threads-agent-bridge
          go build -o /tmp/threads ./cmd/threads
