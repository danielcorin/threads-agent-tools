name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  cli:
    name: CLI and contracts
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run check:cli

  bridge:
    name: Agent bridge
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24.x'
          cache-dependency-path: bridge/go.sum
      - name: Check formatting
        run: |
          files=$(gofmt -l .)
          test -z "$files" || {
            echo "$files"
            exit 1
          }
        working-directory: bridge
      - run: go vet ./...
        working-directory: bridge
      - run: go test ./...
        working-directory: bridge
      - run: go build ./cmd/threads-agent-bridge
        working-directory: bridge
