name: Bug report
description: Report a problem with threads-agent-bridge
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened? What did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Include config shape, runner type, and relevant logs with secrets removed.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: v0.1.2
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: macOS/Linux, arch, runner CLI versions
